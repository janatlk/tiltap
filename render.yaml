services:
  - type: web
    name: tiltab
    runtime: docker
    repo: https://github.com/janatlk/tiltap
    branch: main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: tiltab-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TILTAB_STT_PROVIDER
        value: auto
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TRANSLATION_MODULE_URL
        sync: false
      - key: LINGVA_TRANSLATE_URL
        value: https://lingva.ml
      - key: LINGVA_TRANSLATE_CHUNK_SIZE
        value: "2000"
      - key: TILTAB_TRANSLATION_PROVIDER
        value: auto
      - key: COBALT_API_URLS
        sync: false
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
    buildFilter:
      paths:
        - src/**
        - scripts/**
        - public/**
        - package*.json
        - tsconfig.json
        - swagger.yaml
        - Dockerfile
        - "*.py"

databases:
  - name: tiltab-db
    plan: free
    databaseName: tiltab
    user: tiltab
