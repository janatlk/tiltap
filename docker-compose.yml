version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: tiltab-db
    environment:
      POSTGRES_USER: tiltab
      POSTGRES_PASSWORD: tiltab_secret
      POSTGRES_DB: tiltab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiltab -d tiltab"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tiltab-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://tiltab:tiltab_secret@db:5432/tiltab
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TRANSLATION_MODULE_URL: ${TRANSLATION_MODULE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models

volumes:
  postgres_data:
