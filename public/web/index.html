<!DOCTYPE html>
<html lang="en" data-theme="business">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TilTap Web</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .dropzone {
      border: 2px dashed color-mix(in oklab, var(--color-base-content) 20%, transparent); background: color-mix(in oklab, var(--color-base-content) 3%, transparent);
      border-radius: var(--radius-box);
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--color-base-content);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      opacity: 0.8;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--color-primary);
      background: color-mix(in oklab, var(--color-primary) 6%, transparent);
      opacity: 1;
    }
    .dropzone input { display: none; }
    .text-box {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      max-height: 320px;
      overflow: auto;
    }
    .segment time {
      color: var(--color-base-content);
      opacity: 0.6;
      white-space: nowrap;
      font-size: 0.75rem;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 py-8 px-4">
  <div class="max-w-3xl mx-auto space-y-6">

    <header class="text-center space-y-2">
      <h1 class="text-3xl font-bold tracking-tight">TilTap Web</h1>
      <p class="text-base-content/70">Transcribe audio, video, and YouTube links. Translate into Kyrgyz, Tajik, Uzbek, Russian, or English.</p>
      <a href="/web/admin.html" class="link link-primary text-sm">Admin panel</a>
    </header>

    <div class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="form-control">
            <label class="label" for="sourceLang"><span class="label-text">Transcription language</span></label>
            <select id="sourceLang" class="select select-bordered w-full">
              <option value="auto">Auto detect</option>
              <option value="ky">Kyrgyz</option>
              <option value="tg">Tajik</option>
              <option value="uz">Uzbek</option>
              <option value="ru">Russian</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label" for="targetLang"><span class="label-text">Translate to</span></label>
            <select id="targetLang" class="select select-bordered w-full">
              <option value="none">No translation</option>
              <option value="ky">Kyrgyz</option>
              <option value="tg">Tajik</option>
              <option value="uz">Uzbek</option>
              <option value="ru">Russian</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card bg-base-100 shadow-sm">
      <div class="card-body space-y-4">
        <div role="tablist" class="tabs tabs-lift">
          <button role="tab" class="tab tab-active" data-tab="file">Upload file</button>
          <button role="tab" class="tab" data-tab="youtube">YouTube link</button>
        </div>

        <div id="panel-file">
          <div class="dropzone" id="dropzone">
            <div class="text-lg font-medium">Drag & drop audio/video here or click to browse</div>
            <input type="file" id="fileInput" accept="audio/*,video/*">
            <div class="mt-3 text-sm opacity-80" id="fileName"></div>
          </div>
        </div>

        <div id="panel-youtube" style="display:none;">
          <div class="form-control">
            <label class="label" for="youtubeUrl"><span class="label-text">YouTube URL</span></label>
            <input type="text" id="youtubeUrl" class="input input-bordered w-full" placeholder="https://www.youtube.com/watch?v=...">
          </div>
        </div>

        <button class="btn btn-primary btn-block" id="startBtn">Start</button>

        <div id="progressWrap" class="hidden space-y-2">
          <progress class="progress progress-primary w-full" id="progressBar" value="0" max="100"></progress>
          <div class="flex justify-between text-sm text-base-content/70">
            <span id="progressLabel">Starting...</span>
            <span id="progressPercent">0%</span>
          </div>
        </div>

        <div id="errorBox" class="alert alert-error hidden" role="alert"></div>

        <div id="resultBox" class="hidden space-y-4">
          <div class="flex flex-wrap justify-between items-center gap-3">
            <h3 class="card-title text-lg" id="resultTitle">Transcription</h3>
            <button class="btn btn-sm btn-outline" id="downloadBtn">Download .txt</button>
          </div>
          <div class="text-sm text-base-content/70" id="resultMeta"></div>
          <div id="translationWarning" class="alert alert-warning hidden text-sm" role="alert"></div>
          <div class="bg-base-200 rounded-box p-4 text-box" id="resultText"></div>

          <div class="flex flex-wrap gap-2 items-center" id="translateButtons">
            <span class="text-sm text-base-content/70">Translate result:</span>
          </div>

          <div id="segmentsBox" class="space-y-2"></div>

          <details id="originalDetails" class="collapse collapse-arrow bg-base-200 rounded-box hidden">
            <summary class="collapse-title text-sm text-base-content/70">Original transcription</summary>
            <div class="collapse-content space-y-3">
              <div class="bg-base-300 rounded-box p-3 text-box" id="originalText"></div>
              <div id="originalSegmentsBox" class="space-y-2"></div>
            </div>
          </details>

          <div id="translationResults" class="space-y-4"></div>
        </div>
      </div>
    </div>

    <footer class="text-center text-sm text-base-content/50 py-4">
      TilTap — local speech-to-text & translation
    </footer>
  </div>

  <script>
    const API = "";
    const SUPPORTED_LANGS = {
      ky: "Kyrgyz",
      tg: "Tajik",
      uz: "Uzbek",
      ru: "Russian",
      en: "English",
    };

    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const youtubeUrl = document.getElementById("youtubeUrl");
    const tabs = document.querySelectorAll("[role='tablist'] .tab");
    const panels = { file: document.getElementById("panel-file"), youtube: document.getElementById("panel-youtube") };
    const startBtn = document.getElementById("startBtn");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressLabel = document.getElementById("progressLabel");
    const progressPercent = document.getElementById("progressPercent");
    const errorBox = document.getElementById("errorBox");
    const resultBox = document.getElementById("resultBox");
    const resultMeta = document.getElementById("resultMeta");
    const resultText = document.getElementById("resultText");
    const segmentsBox = document.getElementById("segmentsBox");
    const translateButtons = document.getElementById("translateButtons");
    const resultTitle = document.getElementById("resultTitle");
    const downloadBtn = document.getElementById("downloadBtn");
    const originalDetails = document.getElementById("originalDetails");
    const originalText = document.getElementById("originalText");
    const originalSegmentsBox = document.getElementById("originalSegmentsBox");
    const translationResults = document.getElementById("translationResults");
    const translationWarning = document.getElementById("translationWarning");

    let currentFile = null;
    let currentJobId = null;
    let currentRequestNumber = null;
    let currentCleanText = "";
    let currentDetectedLang = "";
    let currentDownloadText = "";
    let currentDownloadFilename = "result.txt";

    function ensureSessionId() {
      let sid = localStorage.getItem("tiltap_session_id");
      if (!sid) {
        sid = "web_" + Math.random().toString(36).slice(2, 12);
        localStorage.setItem("tiltap_session_id", sid);
      }
      return sid;
    }
    ensureSessionId();

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("tab-active"));
        tab.classList.add("tab-active");
        const key = tab.dataset.tab;
        Object.entries(panels).forEach(([k, el]) => {
          el.style.display = k === key ? "block" : "none";
        });
      });
    });

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      currentFile = file;
      fileName.textContent = file.name + " (" + (file.size / 1024 / 1024).toFixed(2) + " MB)";
    }

    function resetUI() {
      errorBox.classList.add("hidden");
      errorBox.textContent = "";
      resultBox.classList.add("hidden");
      resultText.textContent = "";
      segmentsBox.innerHTML = "";
      originalDetails.classList.add("hidden");
      originalDetails.open = false;
      originalText.textContent = "";
      originalSegmentsBox.innerHTML = "";
      translationResults.innerHTML = "";
      translateButtons.style.display = "flex";
      segmentsBox.style.display = "block";
      progressWrap.classList.remove("hidden");
      progressBar.value = 0;
      progressLabel.textContent = "Starting...";
      progressPercent.textContent = "0%";
      startBtn.disabled = true;
      currentRequestNumber = null;
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove("hidden");
      progressWrap.classList.add("hidden");
      startBtn.disabled = false;
    }

    function mapErrorMessage(error, reason) {
      const code = reason || error;
      const messages = {
        not_available: "This video is not available. It may be deleted, private, region-blocked, or the URL is incorrect.",
        sign_in_required: "This video requires a YouTube sign-in. The bot cannot download it. Try another video.",
        private: "This is a private video. The bot cannot download it.",
        age_restricted: "This video is age-restricted. The bot cannot download it.",
        invalid: "Invalid YouTube URL.",
        timeout: "YouTube check timed out. Please try again.",
      };
      return messages[code] || error || "Request failed";
    }

    function updateProgress(progress) {
      const pct = Math.max(0, Math.min(100, progress.percent));
      progressBar.value = pct;
      progressLabel.textContent = progress.label || "Working...";
      progressPercent.textContent = pct + "%";
    }

    function renderTranslateButtons() {
      translateButtons.innerHTML = '<span class="text-sm text-base-content/70">Translate result:</span>';
      Object.entries(SUPPORTED_LANGS).forEach(([code, label]) => {
        if (code === currentDetectedLang) return;
        const btn = document.createElement("button");
        btn.className = "btn btn-xs btn-outline";
        btn.textContent = label;
        btn.addEventListener("click", () => translateResult(code));
        translateButtons.appendChild(btn);
      });
    }

    function renderSegments(container, segments) {
      container.innerHTML = "";
      if (segments.length > 1) {
        const title = document.createElement("h4");
        title.textContent = "Timed segments";
        title.className = "text-sm font-semibold text-base-content/70 mb-2";
        container.appendChild(title);
        segments.forEach((seg) => {
          const div = document.createElement("div");
          div.className = "segment flex gap-3 py-2 border-b border-base-300 last:border-0";
          div.innerHTML = `<time>${formatTime(seg.start)} → ${formatTime(seg.end)}</time><span>${escapeHtml(seg.text)}</span>`;
          container.appendChild(div);
        });
      }
    }

    function renderResult(job) {
      const result = job.result;
      currentCleanText = job.cleanedText || result.text;
      currentDetectedLang = result.language;
      const targetLang = document.getElementById("targetLang").value;

      const requestMeta = currentRequestNumber ? ` · Request #${currentRequestNumber}` : "";
      resultMeta.textContent = "Detected: " + (SUPPORTED_LANGS[result.language] || result.language) +
        " · Segments: " + result.segments.length + requestMeta;

      translationWarning.classList.add("hidden");
      translationWarning.textContent = "";
      if (job.translationError) {
        translationWarning.textContent = "Translation failed: " + job.translationError;
        translationWarning.classList.remove("hidden");
      }

      if (job.translatedText && targetLang !== "none") {
        resultTitle.textContent = SUPPORTED_LANGS[job.translatedLang] || job.translatedLang;
        resultText.textContent = job.translatedText;
        currentDownloadText = job.translatedText;
        currentDownloadFilename = "translation_" + Date.now() + ".txt";

        translateButtons.style.display = "none";
        segmentsBox.style.display = "none";

        originalText.textContent = currentCleanText;
        renderSegments(originalSegmentsBox, result.segments);
        originalDetails.classList.remove("hidden");
      } else {
        resultTitle.textContent = "Transcription";
        resultText.textContent = currentCleanText;
        currentDownloadText = currentCleanText;
        currentDownloadFilename = "transcription_" + Date.now() + ".txt";

        translateButtons.style.display = "flex";
        segmentsBox.style.display = "block";
        renderSegments(segmentsBox, result.segments);
        renderTranslateButtons();

        originalDetails.classList.add("hidden");
        originalText.textContent = "";
        originalSegmentsBox.innerHTML = "";
      }

      resultBox.classList.remove("hidden");
      progressWrap.classList.add("hidden");
      startBtn.disabled = false;
    }

    function showTranslation(lang, text) {
      const div = document.createElement("div");
      div.className = "card card-compact bg-base-200";
      div.innerHTML = `
        <div class="card-body">
          <h4 class="card-title text-sm">${SUPPORTED_LANGS[lang] || lang}</h4>
          <div class="bg-base-300 rounded-box p-3 text-box">${escapeHtml(text)}</div>
        </div>
      `;
      translationResults.appendChild(div);
    }

    async function translateResult(targetLang) {
      if (!currentCleanText) return;
      const btn = event.target;
      btn.disabled = true;
      try {
        const res = await fetch(API + "/api/web/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: currentCleanText, targetLang }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Translation failed");
        showTranslation(targetLang, data.translatedText);
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    const MAX_FILE_BYTES = 25 * 1024 * 1024;

    function uploadFileWithProgress(form, url) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", url, true);

        xhr.upload.addEventListener("progress", (e) => {
          if (e.lengthComputable) {
            const pct = Math.max(0, Math.min(95, Math.round((e.loaded / e.total) * 30)));
            updateProgress({ percent: pct, label: "Uploading file..." });
          }
        });

        xhr.addEventListener("load", () => {
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve({ ok: true, status: xhr.status, data });
            } else {
              resolve({ ok: false, status: xhr.status, data });
            }
          } catch {
            resolve({ ok: false, status: xhr.status, data: { error: xhr.responseText || `Server returned ${xhr.status}` } });
          }
        });

        xhr.addEventListener("error", () => reject(new Error("Upload failed. Please check your connection and try again.")));
        xhr.addEventListener("abort", () => reject(new Error("Upload was cancelled.")));
        xhr.addEventListener("timeout", () => reject(new Error("Upload timed out. The file may be too large or the connection is slow.")));

        xhr.send(form);
      });
    }

    async function startJob() {
      resetUI();
      try {
        const sourceLang = document.getElementById("sourceLang").value;
        const targetLang = document.getElementById("targetLang").value;
        const activeTab = document.querySelector(".tab-active").dataset.tab;

        let data;
        if (activeTab === "file") {
          if (!currentFile) throw new Error("Please select a file first");
          if (currentFile.size > MAX_FILE_BYTES) {
            throw new Error(`File is too large (${(currentFile.size / 1024 / 1024).toFixed(1)} MB). Max allowed is 25 MB.`);
          }
          const form = new FormData();
          form.append("file", currentFile);
          form.append("sourceLang", sourceLang);
          form.append("targetLang", targetLang);
          const res = await uploadFileWithProgress(form, API + "/api/web/transcribe");
          if (!res.ok) throw new Error(mapErrorMessage(res.data.error, res.data.details?.reason) || "Request failed");
          data = res.data;
        } else {
          if (!youtubeUrl.value.trim()) throw new Error("Please enter a YouTube URL");
          const res = await fetch(API + "/api/web/youtube", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: youtubeUrl.value.trim(), sourceLang, targetLang }),
          });
          try {
            data = await res.json();
          } catch {
            const text = await res.text().catch(() => "");
            throw new Error(text || `Server returned ${res.status}`);
          }
          if (!res.ok) throw new Error(mapErrorMessage(data.error, data.details?.reason) || "Request failed");
        }

        currentJobId = data.jobId;
        currentRequestNumber = data.requestNumber || null;
        listenProgress(currentJobId);
      } catch (err) {
        showError(err.message);
      }
    }

    function listenProgress(jobId) {
      const es = new EventSource(API + "/api/web/jobs/" + jobId + "/progress");
      es.onmessage = (e) => {
        const job = JSON.parse(e.data);
        if (job.progress) updateProgress(job.progress);
        if (job.status === "completed") {
          es.close();
          renderResult(job);
        } else if (job.status === "failed") {
          es.close();
          showError(job.error || "Job failed");
        }
      };
      es.onerror = () => {
        es.close();
        pollJob(jobId);
      };
    }

    async function pollJob(jobId) {
      const interval = setInterval(async () => {
        try {
          const res = await fetch(API + "/api/web/jobs/" + jobId);
          const job = await res.json();
          if (!res.ok) throw new Error(job.error);
          if (job.progress) updateProgress(job.progress);
          if (job.status === "completed") {
            clearInterval(interval);
            renderResult(job);
          } else if (job.status === "failed") {
            clearInterval(interval);
            showError(job.error || "Job failed");
          }
        } catch (err) {
          clearInterval(interval);
          showError(err.message);
        }
      }, 1000);
    }

    downloadBtn.addEventListener("click", () => {
      if (!currentDownloadText) return;
      const blob = new Blob([currentDownloadText], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = currentDownloadFilename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function saveLanguagePrefs() {
      localStorage.setItem("tiltab_source_lang", document.getElementById("sourceLang").value);
      localStorage.setItem("tiltab_target_lang", document.getElementById("targetLang").value);
    }

    function loadLanguagePrefs() {
      const savedSource = localStorage.getItem("tiltab_source_lang");
      const savedTarget = localStorage.getItem("tiltab_target_lang");
      if (savedSource) document.getElementById("sourceLang").value = savedSource;
      if (savedTarget) document.getElementById("targetLang").value = savedTarget;
    }

    document.getElementById("sourceLang").addEventListener("change", saveLanguagePrefs);
    document.getElementById("targetLang").addEventListener("change", saveLanguagePrefs);
    loadLanguagePrefs();

    startBtn.addEventListener("click", startJob);

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      const ms = Math.floor((seconds % 1) * 1000);
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0") + "." + String(ms).padStart(3, "0");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
